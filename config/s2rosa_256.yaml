DATASET: 's2rosa'
NO_SAM: False
SAM_VERSION: 'vit_b'
SAM_CKPT_PATH: 'sam_ckpts/sam_vit_b_01ec64.pth'
PATCH_SIZE: 256
BATCH_SIZE: 16
DATA_WORKER_NUM: 2
TRAIN_EPOCHS: 30
BASE_LR: 0.001
FREEZE_ENCODER: False
ENCODER_LR_FACTOR: 0.1
ENCODER_LORA: False
FOCAL_LOSS: False
USE_SAM_DECODER: False

# TOPONET
# graph samples per patch
TOPO_SAMPLE_NUM: 128

# Inference
INFER_BATCH_SIZE: 64
SAMPLE_MARGIN: 0
INFER_PATCHES_PER_EDGE: 1

# thresholds on sigmoid scores [0, 1]
ITSC_THRESHOLD: 0.5
ROAD_THRESHOLD: 0.5
TOPO_THRESHOLD: 0.5
# pixels
ITSC_NMS_RADIUS: 8
ROAD_NMS_RADIUS: 16
NEIGHBOR_RADIUS: 64
MAX_NEIGHBOR_QUERIES: 16
